<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Random Number Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', 'Fira Code', monospace;
            background: #000000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Matrix Rain Effect */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }
        
        .container {
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.05);
            text-align: center;
            max-width: 750px;
            width: 100%;
            backdrop-filter: blur(5px);
            animation: glowPulse 2s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 30px rgba(0, 255, 0, 0.3), inset 0 0 20px rgba(0, 255, 0, 0.05);
                border-color: #00ff00;
            }
            50% {
                box-shadow: 0 0 50px rgba(0, 255, 0, 0.6), inset 0 0 30px rgba(0, 255, 0, 0.1);
                border-color: #00ff66;
            }
        }
        
        h1 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 2em;
            text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
            letter-spacing: 3px;
            animation: textGlitch 3s infinite;
        }
        
        @keyframes textGlitch {
            0%, 100% {
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
                opacity: 1;
            }
            95% {
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
                opacity: 1;
            }
            96% {
                text-shadow: -2px 0 red, 2px 0 blue;
                opacity: 0.8;
            }
            97% {
                text-shadow: 2px 0 red, -2px 0 blue;
                opacity: 0.9;
            }
            98% {
                text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00;
                opacity: 1;
            }
        }
        
        .subtitle {
            color: #00cc00;
            margin-bottom: 30px;
            font-size: 0.9em;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        
        .subtitle::before {
            content: "> ";
            color: #00ff00;
        }
        
        .subtitle::after {
            content: " _";
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        .number-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ff00;
            border-radius: 10px;
            padding: 40px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .number-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.1), transparent);
            animation: scan 3s linear infinite;
        }
        
        @keyframes scan {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }
        
        .random-number {
            font-size: 1.6em;
            font-weight: bold;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            word-break: break-all;
            text-shadow: 0 0 8px #00ff00;
            position: relative;
            z-index: 1;
        }
        
        .info {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border-left: 3px solid #00ff00;
            border-radius: 5px;
            text-align: left;
        }
        
        .info-item {
            margin: 10px 0;
            color: #00cc00;
            font-family: 'Courier New', monospace;
        }
        
        .label {
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }
        
        .label::before {
            content: ">";
            margin-right: 8px;
            color: #00ff00;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }
        
        .status.success {
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        
        .status.error {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
            border: 1px solid #ff4444;
        }
        
        .status.loading {
            background: rgba(0, 255, 0, 0.05);
            color: #00cc00;
            border: 1px solid #00cc00;
        }
        
        button {
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            border: 2px solid #00ff00;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .refresh-time {
            font-size: 0.7em;
            color: #008800;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 8px #00ff00; }
            50% { transform: scale(1.02); text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00; }
            100% { transform: scale(1); text-shadow: 0 0 8px #00ff00; }
        }
        
        .pulse {
            animation: pulse 0.5s ease-in-out;
        }
        
        /* Terminal cursor effect */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background-color: #00ff00;
            animation: blink 1s infinite;
            margin-left: 5px;
            vertical-align: middle;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            .random-number {
                font-size: 1.1em;
                letter-spacing: 1px;
            }
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    
    <div class="container">
        <h1>RANDOM NUMBER GENERATOR</h1>
        <div class="subtitle">16-BIT ENCRYPTED SEQUENCE</div>
        
        <div class="number-container">
            <div class="random-number" id="randomNumber">---- ---- ---- ----</div>
        </div>
        
        <div class="info">
            <div class="info-item">
                <span class="label">LAST_UPDATE</span>
                <span id="lastUpdated" style="color: #00cc00; margin-left: 10px;">LOADING...</span>
            </div>
            <div class="info-item">
                <span class="label">SEQUENCE_TYPE</span>
                <span style="color: #00cc00; margin-left: 10px;">16-DIGIT HEXADECIMAL</span>
            </div>
            <div class="info-item">
                <span class="label">STATUS</span>
                <span style="color: #00ff00; margin-left: 10px;">ACTIVE</span>
                <span class="cursor"></span>
            </div>
        </div>
        
        <div id="status" class="status loading">
            [SYSTEM] Initializing connection...
        </div>
        
        <button onclick="fetchRandomNumber()">[ REFRESH SEQUENCE ]</button>
        
        <div class="refresh-time">
            &gt; AUTO-REFRESH: 5 MINUTE INTERVAL
        </div>
    </div>
    
    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890';
        const nums = '0123456789';
        const alphabet = katakana + latin + nums;
        
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        const rainDrops = [];
        
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#0f0';
            ctx.font = fontSize + 'px monospace';
            
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        
        setInterval(drawMatrix, 35);
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            for (let i = 0; i < columns; i++) {
                if (rainDrops[i] === undefined) rainDrops[i] = 1;
            }
        });
        
        // Function to format 16-digit number as xxxx xxxx xxxx xxxx
        function formatNumber(num) {
            const numStr = num.toString();
            return numStr.replace(/(\d{4})(?=\d)/g, '$1 ');
        }
        
        // Function to fetch the random number from JSON file
        async function fetchRandomNumber() {
            const statusDiv = document.getElementById('status');
            const randomNumberSpan = document.getElementById('randomNumber');
            const lastUpdatedSpan = document.getElementById('lastUpdated');
            
            // Show loading state
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '[SYSTEM] Fetching secure random sequence...';
            
            // Add pulse animation to number
            randomNumberSpan.classList.add('pulse');
            
            try {
                // Add cache-busting timestamp to avoid caching
                const timestamp = new Date().getTime();
                const response = await fetch(`random_number.json?t=${timestamp}`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Update the display with formatted number
                const formattedNumber = formatNumber(data.random_number);
                randomNumberSpan.textContent = formattedNumber;
                lastUpdatedSpan.textContent = data.last_updated;
                
                // Show success status
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '[SUCCESS] Random sequence generated successfully!';
                
                // Log to console
                console.log('16-digit random number:', data.random_number);
                console.log('Last updated:', data.last_updated);
                
                // Auto-hide status after 3 seconds
                setTimeout(() => {
                    if (statusDiv.className === 'status success') {
                        statusDiv.style.opacity = '0';
                        setTimeout(() => {
                            statusDiv.style.opacity = '1';
                            statusDiv.innerHTML = '[READY] System online';
                        }, 300);
                    }
                }, 3000);
                
            } catch (error) {
                console.error('Error fetching random number:', error);
                
                // Show error status
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '[ERROR] Failed to fetch random sequence';
                
                // Try to show fallback data
                randomNumberSpan.textContent = '---- ---- ---- ----';
                lastUpdatedSpan.textContent = 'Unavailable';
            } finally {
                // Remove pulse animation after 500ms
                setTimeout(() => {
                    randomNumberSpan.classList.remove('pulse');
                }, 500);
            }
        }
        
        // Auto-refresh the page every 5 minutes to get latest data
        setInterval(() => {
            fetchRandomNumber();
        }, 300000); // 5 minutes
        
        // Also refresh the page data every minute to check for updates
        setInterval(() => {
            fetchRandomNumber();
        }, 60000); // 1 minute
        
        // Initial load
        fetchRandomNumber();
        
        // Add manual refresh on page visibility change (when user returns to tab)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchRandomNumber();
            }
        });
        
        // Terminal typing effect on load
        window.addEventListener('load', () => {
            const statusDiv = document.getElementById('status');
            setTimeout(() => {
                statusDiv.innerHTML = '[READY] System online';
            }, 1500);
        });
    </script>
</body>
</html>
