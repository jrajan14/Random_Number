name: Update Random Number

on:
  schedule:
    - cron: '07 0 * * *'
    - cron: '13 1 * * *'
    - cron: '26 2 * * *'
    - cron: '11 3 * * *'
    - cron: '05 4 * * *'
    - cron: '22 5 * * *'
    - cron: '09 6 * * *'
    - cron: '14 7 * * *'
    - cron: '03 8 * * *'
    - cron: '21 9 * * *'
    - cron: '08 10 * * *'
    - cron: '17 11 * * *'
    - cron: '06 12 * * *'
    - cron: '12 13 * * *'
    - cron: '19 14 * * *'
    - cron: '04 15 * * *'
    - cron: '10 16 * * *'
    - cron: '18 17 * * *'
    - cron: '16 18 * * *'
    - cron: '21 19 * * *'
    - cron: '27 20 * * *'
    - cron: '03 21 * * *'
    - cron: '08 22 * * *'
    - cron: '55 23 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Generate random 16-digit number using /dev/urandom
        run: |
          RANDOM_NUM=$(od -An -N8 -tu8 /dev/urandom | awk '{print $1}' | cut -c1-16)
          if [ ${#RANDOM_NUM} -lt 16 ]; then
              RANDOM_NUM="${RANDOM_NUM}$(od -An -N4 -tu4 /dev/urandom | awk '{print $1}' | cut -c1-$((16-${#RANDOM_NUM})))"
          fi
          RANDOM_NUM=$(echo $RANDOM_NUM | grep -o '[0-9]*' | cut -c1-16)
          while [ ${RANDOM_NUM:0:1} -eq 0 ]; do
              RANDOM_NUM=$(od -An -N8 -tu8 /dev/urandom | awk '{print $1}' | cut -c1-16)
          done
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          echo "{\"random_number\": $RANDOM_NUM, \"last_updated\": \"$TIMESTAMP\"}" > random_number.json          
          echo "Generated 16-digit number: $RANDOM_NUM"
          echo "Timestamp: $TIMESTAMP"
      
      - name: Force push to main
        run: |
          git config user.name "jrajan14"
          git config user.email "j.rajan14@yahoo.com"
          git add random_number.json
          git commit -m "Update random number" || exit 0
          git push origin main --force
