name: Update Random Number

on:
  schedule:
    - cron: '07 0 * * *'
    - cron: '42 1 * * *'
    - cron: '15 2 * * *'
    - cron: '53 3 * * *'
    - cron: '21 4 * * *'
    - cron: '36 5 * * *'
    - cron: '08 6 * * *'
    - cron: '49 7 * * *'
    - cron: '17 8 * * *'
    - cron: '58 9 * * *'
    - cron: '26 10 * * *'
    - cron: '41 11 * * *'
    - cron: '12 12 * * *'
    - cron: '55 13 * * *'
    - cron: '19 14 * * *'
    - cron: '47 15 * * *'
    - cron: '03 16 * * *'
    - cron: '34 17 * * *'
    - cron: '22 18 * * *'
    - cron: '50 19 * * *'
    - cron: '11 20 * * *'
    - cron: '39 21 * * *'
    - cron: '05 22 * * *'
    - cron: '44 23 * * *'
  
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Make random number and overwrite file
        run: |
          RANDOM_NUM=$((RANDOM % 1000 + 1))
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          echo "{\"random_number\": $RANDOM_NUM, \"last_updated\": \"$TIMESTAMP\"}" > random_number.json
          
          echo "Generated: $RANDOM_NUM at $TIMESTAMP"
      
      - name: Force push to main
        run: |
          git config user.name "jrajan14"
          git config user.email "j.rajan14@yahoo.com"
          git add random_number.json
          git commit -m "Update random number" || exit 0
          git push origin main --force
