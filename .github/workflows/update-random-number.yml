name: Update Random Number

on:
  schedule:
    - cron: '0 1,5,13,16,20,22 * * *'
    - cron: '30 23 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-number:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate and save random number
        run: |
          RANDOM_NUM=$((RANDOM % 1000 + 1))
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S UTC')
          
          printf '{\n' > random_number.json
          printf '  "random_number": %d,\n' "$RANDOM_NUM" >> random_number.json
          printf '  "last_updated": "%s",\n' "$TIMESTAMP" >> random_number.json
          printf '  "update_history": []\n' >> random_number.json
          printf '}\n' >> random_number.json
          
          echo "Generated random number: $RANDOM_NUM"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add random_number.json
          git diff --staged --quiet || git commit -m "Auto-update random number"
          git push
