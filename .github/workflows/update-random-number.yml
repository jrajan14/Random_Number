name: Update Random Number

on:
  schedule:
    - cron: '0 1,5,13,16,20,22 * * *'
    - cron: '30 23 * * *'
    - cron: '44 19 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history to avoid conflicts
      
      - name: Make random number
        run: |
          echo $(($RANDOM % 1000 + 1)) > num.txt
          echo "{\"random_number\": $(cat num.txt), \"last_updated\": \"$(date -u +'%Y-%m-%d %H:%M:%S UTC')\"}" > random_number.json
          cat random_number.json
      
      - name: Commit and push
        run: |
          # Pull latest changes first
          git pull --rebase origin main
          
          # Configure git
          git config user.name "jrajan14"
          git config user.email "j.rajan14@yahoo.com"
          
          # Commit and push
          git add random_number.json
          git commit -m "Update random number ($(date -u +%Y-%m-%d))" || echo "No changes to commit"
          git push origin main
