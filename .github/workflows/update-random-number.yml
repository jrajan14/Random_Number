name: Update Random Number

on:
  schedule:
    - cron: '0 1,5,13,16,20,22 * * *'
    - cron: '30 23 * * *'
    - cron: '06 20 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Make random number
        run: |
          echo $(($RANDOM % 1000 + 1)) > num.txt
          echo "{\"random_number\": $(cat num.txt), \"last_updated\": \"$(date -u +'%Y-%m-%d %H:%M:%S UTC')\"}" > random_number.json
          cat random_number.json
      
      - name: Commit and push
        run: |
          git config user.name "jrajan14"
          git config user.email "j.rajan14@yahoo.com"
          
          git add random_number.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update random number ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main || echo "Pull failed, continuing..."
            git push origin main
          fi
