name: Update Random Number

on:
  schedule:
    - cron: '0 1,5,13,16,20,22 * * *'
    - cron: '58 23 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  update-number:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate random number
        id: random
        run: |
          RANDOM_NUM=$((RANDOM % 1000 + 1))
          echo "number=$RANDOM_NUM" >> $GITHUB_OUTPUT
          echo "timestamp=$(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
      
      - name: Create JSON file
        run: |
          echo '{' > random_number.json
          echo '  "random_number": ${{ steps.random.outputs.number }},' >> random_number.json
          echo '  "last_updated": "${{ steps.random.outputs.timestamp }}",' >> random_number.json
          echo '  "update_history": []' >> random_number.json
          echo '}' >> random_number.json
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add random_number.json
          git commit -m "Update random number to ${{ steps.random.outputs.number }}" || echo "No changes to commit"
          git push
