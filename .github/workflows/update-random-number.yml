name: Update Random Number

on:
  schedule:
    - cron: '0 1,5,13,16,20,22 * * *'
    - cron: '30 23 * * *'
    - cron: '36 00 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Make random number
        run: |
          echo $(($RANDOM % 1000 + 1)) > num.txt
          echo "{\"random_number\": $(cat num.txt), \"last_updated\": \"$(date -u +'%Y-%m-%d %H:%M:%S UTC')\"}" > random_number.json
          cat random_number.json
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add random_number.json
          git commit -m "Update random number ($(date -u +%Y-%m-%d))" || echo "No changes"
          git push
